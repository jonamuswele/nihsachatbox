services:
  - type: web
    name: nihsa-ai-wrapper
    env: docker
    dockerfilePath: ./Dockerfile
    plan: standard
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
        sync: false
      - key: CLOUDFLARE_ACCOUNT_ID
        sync: false
      - key: CLOUDFLARE_API_TOKEN
        sync: false
      - key: NIHSA_API_URL
        value: https://nihsa-backend-20hh.onrender.com/api
      - key: ALLOWED_ORIGINS
        value: capacitor://localhost,http://localhost:3000,https://nihsa-backend-20hh.onrender.com
      - key: TTS_CACHE_DIR
        value: /app/tts_cache
